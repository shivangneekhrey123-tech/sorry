<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  overflow: hidden;
}
.page { display: none; height: 100vh; overflow: hidden; }
/* Allow scroll on last page */
#page3 { overflow-y: auto; padding-bottom: 50px; }
.active { display: block; }
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
#noBtn { position: absolute; }

/* Bigger roses */
.rose {
  position: absolute;
  font-size: 40px;
  animation: fall 5s linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-50px); }
  100% { transform: translateY(100vh); }
}

/* Collage styles */
.collage {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  max-width: 500px;
  margin: 20px auto;
}
.collage img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 15px;
  transition: transform 0.3s;
}
.collage img:hover {
  transform: scale(1.1);
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h1>I'm Really Sorry ❤️</h1>
  <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" width="250">
  <p>Please forgive me 🥺</p>
  <button onclick="goToPage(2)">Yes 💖</button>
  <button id="noBtn">No 😢</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h1>You said YES 😍</h1>
  <div id="roses"></div>

  <!-- Photo Collage -->
  <div class="collage">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
    <img src="https://via.placeholder.com/150">
  </div>

  <button onclick="goToPage(3)">Next ➡️</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div style="max-width:700px; margin:auto; padding:20px;">
  <h1>My Promise ❤️</h1>
  <p style="font-size:20px; max-width:600px; margin:auto;">
    I am truly sorry for my mistake. I never wanted to hurt you.
    I promise I will learn from this and never repeat it again.
    You mean everything to me, and I will always respect your feelings.
  </p>
  </div>
</div>

<!-- Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<script>
function goToPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
}

// Moving NO button
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseover', () => {
  noBtn.style.top = Math.random() * 80 + 'vh';
  noBtn.style.left = Math.random() * 80 + 'vw';
});

// Roses animation
function createRose() {
  const rose = document.createElement('div');
  rose.innerHTML = '🌹';
  rose.classList.add('rose');
  rose.style.left = Math.random() * 100 + 'vw';
  document.getElementById('roses').appendChild(rose);
  setTimeout(() => rose.remove(), 5000);
}
setInterval(createRose, 300);

// Ensure music plays after interaction
 document.body.addEventListener('click', () => {
  const music = document.getElementById('bgMusic');
  music.play().catch(() => {});
});
</script>

</body>
</html>
